// ---- Server List ----
function filterTag(tag) {
  document.getElementById('server-search-input').value = tag;
  renderServers();
}

function renderServers() {
  const q = document.getElementById('server-search-input').value.toLowerCase().trim();
  const filtered = q ? servers.filter(s =>
    (s.name || '').toLowerCase().includes(q) ||
    (s.host || '').toLowerCase().includes(q) ||
    (s.user || '').toLowerCase().includes(q) ||
    (s.tags || '').toLowerCase().includes(q)
  ) : servers;
  const el = document.getElementById('server-list');
  el.innerHTML = filtered.map((s, i) => {
    const ss = Object.values(sessions).filter(x => x.serverId === s.id);
    const connected = ss.some(x => x.connected);
    const connecting = ss.some(x => x.connecting);
    const status = connected ? 'connected' : (connecting ? 'connecting' : 'disconnected');
    const isActive = activeSessionId && sessions[activeSessionId]?.serverId === s.id;
    const tags = (s.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    return `<div class="server-item ${isActive?'active':''}" onclick="selectServer('${s.id}')" data-id="${s.id}">
      <span class="status-dot ${status}"></span>
      <div class="server-info">
        <div class="server-name">${escHtml(s.name) || escHtml(s.host)}</div>
        <div class="server-host">${escHtml(s.user)}@${escHtml(s.host)}:${s.port}</div>
        ${tags.length ? '<div class="server-tags">'+tags.map(t=>'<span class="tag" onclick="event.stopPropagation();filterTag(\''+escJsStr(t)+'\')">'+escHtml(t)+'</span>').join('')+'</div>' : ''}
      </div>
      <button class="del-btn" onclick="event.stopPropagation();openNewTerminal('${s.id}')" title="新建终端"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></button>
      <button class="del-btn" onclick="event.stopPropagation();editServer('${s.id}')" title="编辑">&#x270E;</button>
      <button class="del-btn" onclick="event.stopPropagation();copyServer('${s.id}')" title="复制"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      <button class="del-btn" onclick="event.stopPropagation();deleteServer('${s.id}')" title="删除">&times;</button>
    </div>`;
  }).join('');
}

function selectServer(id) {
  const ss = Object.keys(sessions).filter(sid => sessions[sid].serverId === id);
  if (ss.length > 0) {
    switchSession(ss[ss.length - 1]);
    return;
  }
  openNewTerminal(id);
}

function openNewTerminal(serverId) {
  const svr = servers.find(s => s.id === serverId);
  if (!svr) return;
  const sid = crypto.randomUUID();
  sessions[sid] = { serverId, connected: false, connecting: true, fsPath: '/', info: { host: svr.host, port: svr.port, user: svr.user } };
  activeSessionId = sid;
  renderServers();
  renderTabs();
  setActiveSession(sid);
  connectToServer(sid);
}

function switchSession(sid) {
  if (!sessions[sid]) return;
  sessions[sid].unread = false;
  activeSessionId = sid;
  renderServers();
  renderTabs();
  setActiveSession(sid);
}

function closeSession(sid) {
  const ses = sessions[sid];
  if (!ses) return;
  if (ses.connected && ses.sessionId) {
    App().CloseSession(ses.sessionId).catch(() => {});
  }
  if (ses.term) { ses.term.dispose(); }
  const container = document.getElementById(`term-${sid}`);
  if (container) container.remove();
  delete sessions[sid];
  if (activeSessionId === sid) {
    const remaining = Object.keys(sessions);
    if (remaining.length > 0) {
      switchSession(remaining[remaining.length - 1]);
    } else {
      activeSessionId = null;
      document.getElementById('tab-bar').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';
      renderServers();
      renderTabs();
      updateStatus();
    }
  } else {
    renderTabs();
    updateStatus();
  }
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const list = document.getElementById('tab-list');
  const sids = Object.keys(sessions);
  if (sids.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  list.innerHTML = sids.map(sid => {
    const ses = sessions[sid];
    const svr = servers.find(s => s.id === ses.serverId);
    const name = svr ? (svr.name || svr.host) : '?';
    const host = svr ? `${svr.user}@${svr.host}:${svr.port}` : '?';
    const active = sid === activeSessionId ? ' active' : '';
    const unread = ses.unread && sid !== activeSessionId ? ' unread' : '';
    return `<div class="tab${active}${unread}" onclick="switchSession('${sid}')" ondblclick="duplicateSession('${sid}')">
      <span class="tab-name">${escHtml(name)}</span>
      <span class="tab-host">${escHtml(host)}</span>
      <button class="tab-refresh" onclick="event.stopPropagation();reconnectSession('${sid}')" title="重新连接"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
      <button class="tab-close" onclick="event.stopPropagation();closeSession('${sid}')">&times;</button>
    </div>`;
  }).join('');
}

function setActiveSession(sid) {
  const ses = sessions[sid];
  if (!ses) return;
  const empty = document.getElementById('empty-state');
  const load = document.getElementById('loading-state');
  if (ses.connected) {
    empty.style.display = 'none';
    load.style.display = 'none';
    document.querySelectorAll('[id^="term-"]').forEach(el => {
      el.style.display = el.id === `term-${sid}` ? 'block' : 'none';
    });
    if (ses.term && ses.fitAddon) {
      setTimeout(() => ses.fitAddon.fit(), 50);
      if (ses.term) ses.term.focus();
    }
  } else if (ses.connecting) {
    empty.style.display = 'none';
    load.style.display = 'flex';
    document.getElementById('loading-text').textContent = '连接中...';
    document.querySelectorAll('[id^="term-"]').forEach(el => {
      el.style.display = 'none';
    });
  } else {
    empty.style.display = 'flex';
    load.style.display = 'none';
    document.querySelectorAll('[id^="term-"]').forEach(el => {
      el.style.display = 'none';
    });
  }
  updateStatus();
  loadFileList();
}

async function connectToServer(sid) {
  const ses = sessions[sid];
  if (!ses) return;
  const svr = servers.find(s => s.id === ses.serverId);
  if (!svr) return;

  const empty = document.getElementById('empty-state');
  const load = document.getElementById('loading-state');
  empty.style.display = 'none';
  load.style.display = 'flex';
  document.getElementById('loading-text').textContent = '连接中...';
  renderServers();
  updateStatus();

  try {
    const sessionId = await connectServerWithPassphraseIfNeeded(svr.id, '');
    ses.sessionId = sessionId;
    ses.connecting = false;
    ses.connected = true;
    initTerminal(sid);
    load.style.display = 'none';
    renderServers();
    updateStatus();
  } catch (err) {
    ses.connecting = false;
    ses.connected = false;
    load.style.display = 'none';
    empty.style.display = 'flex';
    document.getElementById('loading-text').textContent = '连接失败: ' + err;
    renderServers();
    updateStatus();
  }
}

async function connectServerWithPassphraseIfNeeded(serverId, passphrase) {
  try {
    return passphrase ? await App().ConnectServerWithPassphrase(serverId, passphrase) : await App().ConnectServer(serverId);
  } catch (err) {
    const msg = String(err && (err.message || err));
    if (msg.includes('私钥已加密') || msg.toLowerCase().includes('passphrase')) {
      const pp = await askPassphrase('私钥已加密，请输入密码短语:');
      if (!pp) throw err;
      return App().ConnectServerWithPassphrase(serverId, pp);
    }
    throw err;
  }
}

function reconnectSession(sid) {
  const ses = sessions[sid];
  if (!ses || ses.connecting) return;
  if (ses.term) {
    ses.term.dispose();
    ses.term = null;
    ses.fitAddon = null;
  }
  const container = document.getElementById(`term-${sid}`);
  if (container) container.remove();
  ses.connected = false;
  ses.connecting = true;
  ses.sessionId = null;
  ses.unread = false;
  activeSessionId = sid;
  renderServers();
  renderTabs();
  setActiveSession(sid);
  connectToServer(sid);
}

// ---- Events from Go ----
window.runtime.EventsOn("terminal:output", function(data) {
  const entry = Object.entries(sessions).find(([, ses]) => ses.sessionId === data.sessionId);
  if (!entry) return;
  const [sid, ses] = entry;
  if (!ses.term) return;
  try {
    const bytes = Uint8Array.from(atob(data.data), c => c.charCodeAt(0));
    ses.term.write(bytes);
    if (sid !== activeSessionId) {
      ses.unread = true;
      renderTabs();
    }
  } catch (_) {}
});

window.runtime.EventsOn("download:progress", function(fileName, written, total) {
  const fillEl = document.getElementById('progress-fill');
  const pctEl = document.getElementById('progress-pct');
  const textEl = document.getElementById('progress-text');
  if (total <= 0) return;
  const pct = Math.min(100, Math.round((written / total) * 100));
  pctEl.textContent = pct + '%';
  fillEl.style.width = pct + '%';
  textEl.textContent = `下载中 ${fileName}`;
});

window.runtime.EventsOn("download:complete", function(info) {
  const progressEl = document.getElementById('file-progress');
  downloadQueue--;
  if (downloadQueue <= 0) {
    progressEl.style.display = 'none';
  }
  const fileName = (info && info.fileName) || '';
  if (info && info.success) {
    showToast(`下载完成 ${fileName}`, 'success');
  } else if (info && info.cancelled) {
    // user cancelled the save dialog — no toast
  } else {
    showToast(`下载失败 ${fileName}${info && info.error ? ': ' + info.error : ''}`, 'error');
  }
});

window.runtime.EventsOn("terminal:closed", function(sessionId) {
  for (const [sid, ses] of Object.entries(sessions)) {
    if (ses.sessionId === sessionId) {
      ses.connected = false;
      if (ses.term) {
        ses.term.write('\r\n\x1b[31m连接已关闭\x1b[0m');
        ses.term.options.disableStdin = true;
      }
      renderServers();
      updateStatus();
      if (filePanelOpen) loadFileList();
      break;
    }
  }
});

function formatSize(bytes) {
  if (bytes === 0) return '0B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
}

async function uploadFiles(files) {
  const ses = getActiveSession();
  if (!ses || !ses.connected || !files.length) return;

  const arr = Array.from(files);
  const progressEl = document.getElementById('file-progress');
  const fillEl = document.getElementById('progress-fill');
  const textEl = document.getElementById('progress-text');
  const pctEl = document.getElementById('progress-pct');
  const cancelEl = document.getElementById('progress-cancel');

  progressEl.style.display = 'block';
  cancelEl.style.display = 'inline';

  const CHUNK_SIZE = 512 * 1024;

  let uploaded = 0;
  let cancelled = false;
  const totalBytes = arr.reduce((sum, f) => sum + f.size, 0);
  let sentBytes = 0;
  activeUpload = { cancelled: false };
  for (const f of arr) {
    try {
      if (activeUpload.cancelled) throw new Error('已取消');
      let startOffset = 0;
      const remotePath = ses.fsPath + '/' + f.name;
      const stat = await App().SFTPStat(ses.sessionId, remotePath);
      if (stat && stat.exists && !stat.isDir && stat.size > 0) {
        if (stat.size < f.size) {
          const answer = await askResumeUpload(`${f.name} 已存在 ${formatSize(stat.size)} / ${formatSize(f.size)}，是否续传？`);
          if (answer === 'cancel') throw new Error('已取消');
          if (answer === 'resume') startOffset = stat.size;
        } else {
          const answer = await askResumeUpload(`${f.name} 已存在完整或更大的远端文件，是否重新上传？`);
          if (answer !== 'restart') throw new Error('已取消');
        }
      }
      sentBytes += startOffset;
      for (let offset = startOffset; offset < f.size;) {
        if (activeUpload.cancelled) throw new Error('已取消');
        const end = Math.min(offset + CHUNK_SIZE, f.size);
        const blob = f.slice(offset, end);
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });

        const nextSent = sentBytes + (end - offset);
        const pct = totalBytes ? Math.min(100, Math.round((nextSent / totalBytes) * 100)) : 100;
        textEl.textContent = `上传中 ${uploaded+1}/${arr.length} ${f.name}`;
        pctEl.textContent = pct + '%';
        fillEl.style.width = pct + '%';

        await App().SFTPUploadChunk(ses.sessionId, ses.fsPath, f.name, base64, offset);
        sentBytes = nextSent;
        offset = end;
        await new Promise(r => setTimeout(r, 0));
      }
      uploaded++;
    } catch (err) {
      cancelled = String(err).includes('已取消');
      showToast(`${cancelled ? '上传已取消' : `上传失败 ${f.name}: ${err}`}`, cancelled ? '' : 'error');
      break;
    }
  }
  cancelEl.style.display = 'none';
  activeUpload = null;
  progressEl.style.display = (uploaded === arr.length || cancelled) ? 'none' : 'block';
  if (uploaded === arr.length) showToast(`成功上传 ${uploaded} 个文件`, 'success');
  loadFileList();
}

function cancelUpload() {
  if (activeUpload) activeUpload.cancelled = true;
}

function askResumeUpload(msg) {
  document.getElementById('resume-msg').textContent = msg;
  document.getElementById('resume-overlay').style.display = 'flex';
  return new Promise(resolve => { resumeWaiter = resolve; });
}

function answerResumeUpload(answer) {
  document.getElementById('resume-overlay').style.display = 'none';
  if (resumeWaiter) resumeWaiter(answer);
  resumeWaiter = null;
}

  } catch (_) {}

// ---- Status ----
function updateStatus() {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const count = document.getElementById('session-count');
  const connected = Object.values(sessions).filter(s => s.connected).length;
  const total = Object.keys(sessions).length;

  if (connected > 0) {
    dot.className = 'dot green';
    text.textContent = `已连接 ${connected} 个`;
  } else if (total > 0) {
    dot.className = 'dot yellow';
    text.textContent = '连接中...';
  } else {
    dot.className = 'dot gray';
    text.textContent = '未连接';
  }
  count.textContent = `${total} 个会话`;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escJsStr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

  await fetchServers();

    e.preventDefault();
    showFilePanelContextMenu(e.clientX, e.clientY);
  });
  fileList.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; fileList.classList.add('drag-over'); });
  fileList.addEventListener('dragover', (e) => { e.preventDefault(); });
  fileList.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; fileList.classList.remove('drag-over'); } });
  fileList.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    fileList.classList.remove('drag-over');
    if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
  });
});

window.addEventListener('resize', () => {

});

name: CI

on:
  push:
    branches: [feat/wails-gui]
    tags: ['gui-v*']
  pull_request:
    branches: [feat/wails-gui]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev dpkg-dev
      - run: go vet ./...

  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev dpkg-dev
      - name: Generate bindings
        run: wails generate module
      - name: Build for Linux
        run: wails build -clean -ldflags "-s -w"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: webssh-linux
          path: build/bin/webssh

  build-macos:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Generate bindings
        run: wails generate module
      - name: Build for macOS
        run: wails build -clean -ldflags "-s -w"
      - name: Package .app
        run: make package
      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: WebSSH-macos
          path: WebSSH.app/

  build-windows:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: bash
      - name: Generate bindings
        run: wails generate module
        shell: bash
      - name: Build for Windows
        run: wails build -clean -ldflags "-s -w"
        shell: bash
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: webssh-windows
          path: build/bin/webssh.exe

  release:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Bundle
        run: |
          mkdir -p dist
          [ -f webssh-linux/webssh ] && cp webssh-linux/webssh dist/webssh-linux-amd64
          [ -f webssh-windows/webssh.exe ] && cp webssh-windows/webssh.exe dist/webssh-windows-amd64.exe
          if [ -d "WebSSH-macos" ]; then
            cp -r WebSSH-macos dist/WebSSH.app
            tar czf dist/WebSSH-macos-universal.tar.gz -C dist WebSSH.app
            rm -rf dist/WebSSH.app
          fi
          ls -lh dist/
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --latest
